<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>本日の一皿、執事より</title>

<style>
body {
  margin: 0;
  padding: 20px 16px 40px;
  background: #f5f1ea;
  color: #2f2a26;
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
  line-height: 1.7;
}

.container {
  max-width: 560px;
  margin: 0 auto;
}

h1 {
  font-size: 1.6rem;
  margin-bottom: 10px;
}

.description {
  font-size: 0.95rem;
  color: #5a514b;
  margin-bottom: 24px;
}

.select-group {
  margin-bottom: 16px;
}

select {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ddd;
  margin-top: 6px;
  font-size: 0.95rem;
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  border: none;
  background: #3f352f;
  color: white;
  font-size: 1rem;
  margin-top: 12px;
}

button:hover {
  opacity: 0.9;
}

.card {
  background: #fffdf9;
  border-radius: 18px;
  padding: 20px 16px;
  margin-top: 20px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.06);
  text-align: left;
}

.retry {
  background: #8c7a6b;
}
</style>
</head>

<body>

<div class="container">

<h1>本日の一皿、執事より</h1>

<p class="description">
ご自宅でのおひとりランチに、<br>
執事が軽やかなご提案をいたします
</p>

<div class="select-group">
<label>お疲れ度</label>
<select id="tired">
  <option>まだ動けます</option>
  <option>やや疲れております</option>
  <option>限界でございます</option>
</select>
</div>

<div class="select-group">
<label>楽したい度</label>
<select id="lazy">
  <option>少しは手を動かします</option>
  <option>なるべく省きたいです</option>
  <option>一切動きたくありません</option>
</select>
</div>

<button onclick="generate()">本日の一皿を賜る</button>

<div id="result" class="card" style="display:none;"></div>

<button onclick="generate()" id="retry" class="retry" style="display:none;">
他のご提案を
</button>

</div>

<script>
const normal = [
`本日は卵かけご飯にございます。<br>
栄養と速度の両立という点で、極めて優秀でございます。<br>
なお、器を変えるだけで“整った一皿感”が演出されます`,

`本日は納豆ご飯にございます。<br>
発酵食品は健康に良いと広く知られております。<br>
なお、混ぜる回数は“なんとなく多め”が推奨されております`,

`本日は釜玉うどんにございます。<br>
温かさと満足感のバランスに優れております。<br>
なお、卵を落とす瞬間が最も料理をした気分になれます`,

`本日は焼きうどんにございます。<br>
フライパン一つで成立する、誠に頼もしい一品でございます。<br>
なお、多少の味のばらつきは“家庭の味”として扱われます`,

`本日は炒飯にございます。<br>
余り物を一つの完成形へと導く、見事な構成力でございます。<br>
なお、強火であるほど上手そうに見える傾向がございます`,

`本日は残り物の全のせ丼にございます。<br>
冷蔵庫の整理と満足感を同時に満たす、合理的な一皿でございます。<br>
なお、見た目は気にされなくて問題ございません`,

`本日は残り物サンドにございます。<br>
挟むという工程により、全体が一体感を持ちます。<br>
なお、何を挟んでも“それらしく”成立する点が魅力でございます`,

`本日はカップ麺にございます。<br>
お湯を注ぐだけで完成する点において、極めて洗練されております。<br>
なお、待ち時間は心を整えるひとときとしてご活用ください`,

`本日はチーズトーストにございます。<br>
香ばしさと手軽さの両立が見事な一品でございます。<br>
なお、焼き色がつくだけで“きちんと感”が増します`,

`本日は外部に委ねるご判断にございます。<br>
時間と労力を温存するという観点において、非常に合理的でございます。<br>
なお、受け取り時の姿勢が最も重要とされております`
];

const rare = [
`極上のご提案がございます。<br>
本日はキャビア丼にございます。<br>
缶詰のキャビアをのせるだけという手軽さが魅力でございます。<br>
なお、卵黄を添えることで、より贅沢な一皿となります`,

`極上のご提案がございます。<br>
本日はトリュフ卵かけご飯にございます。<br>
いつもの一杯に、フレッシュトリュフを薄く重ねるだけでございます。<br>
なお、香りは惜しみなくお楽しみください`
];

function generate() {
  const isRare = Math.random() < 0.15;
  const list = isRare ? rare : normal;
  const item = list[Math.floor(Math.random() * list.length)];

  document.getElementById("result").innerHTML = item;
  document.getElementById("result").style.display = "block";
  document.getElementById("retry").style.display = "block";
}
</script>

</body>
</html>
